<canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
(function () {

  const canvas = document.getElementById('gameCanvas');
  const ctx    = canvas.getContext('2d');
  const W = 800, H = 600;

  /* ── CARRETERA ───────────────────────────────────────────────────────── */
  const ROAD_X     = 220;
  const ROAD_W     = 360;
  const ROAD_RIGHT = ROAD_X + ROAD_W;
  const LANE_COUNT = 6;
  const LANE_W     = ROAD_W / LANE_COUNT; // 60px por carril

  /* ── TUNEABLES (todas las velocidades en px/segundo o seg) ───────────── */
  const PLAYER_W        = LANE_W - 8;
  const PLAYER_H        = 56;
  const OBSTACLE_W      = LANE_W - 8;
  const OBSTACLE_H      = 66;
  const LANE_MOVE_DELAY = 130;         // ms entre cambios de carril
  const BASE_ROAD_SPEED = 420;         // px/segundo (equivale a ~7 px/frame a 60fps)
  const SPEED_STEP      = 84;          // px/seg que se suma cada intervalo
  const SPEED_INTERVAL  = 10;          // segundos entre cada subida de velocidad
  const OBSTACLE_INTERVAL = 0.8;       // segundos entre spawns de obstáculos
  const SNAP_SPEED      = 40;          // veces por segundo que se recorre la distancia al carril destino
  const STAR_BASE_SPEED = 60;          // px/segundo de las estrellas de fondo

  /* ── PALETA ──────────────────────────────────────────────────────────── */
  const C = {
    bg:'#050510', bgAlt:'#080818', road:'#0d0d20',
    roadEdge:'#7000ff', laneLine:'#1a1a3a',
    p1:'#00c8ff', p1glow:'rgba(0,200,255,0.6)', p1dark:'#004466',
    p2:'#ff2d96', p2glow:'rgba(255,45,150,0.6)', p2dark:'#440028',
    enemy:'#ff3030', enemyGlow:'rgba(255,48,48,0.55)', enemyDark:'#440000',
    ui:'#e0e0ff', uiDim:'#7070aa',
    gold:'#ffd700', title:'#cc88ff', titleGlow:'rgba(200,100,255,0.7)',
    explosion:['#ff6000','#ff3000','#ffcc00','#ff0060','#ffffff'],
  };

  /* ── ESTADO ──────────────────────────────────────────────────────────── */
  let gameState = 'menu';
  let mode      = 1;
  let roadOffset, roadSpeed, spawnTimer, speedTimer;
  let lastTime = 0, deltaAcc = 0;
  let particles, obstacles, keys = {}, bgStars = [];
  let p1, p2;

  /* ── RÉCORDS (guardados en cookies) ──────────────────────────────────── */
  function getCookie(name) {
    const match = document.cookie.match(new RegExp('(?:^|; )' + name + '=([^;]*)'));
    return match ? parseInt(decodeURIComponent(match[1]), 10) || 0 : 0;
  }
  function setCookie(name, value) {
    const expires = new Date();
    expires.setFullYear(expires.getFullYear() + 5); // 5 años
    document.cookie = name + '=' + encodeURIComponent(value) +
      '; expires=' + expires.toUTCString() + '; path=/';
  }

  let record1P = getCookie('nls_record_1p');
  let record2P = getCookie('nls_record_2p'); // mejor puntuación individual en modo 2J

  const keyJustPressed = {};
  const lastLaneMove   = { 1: 0, 2: 0 };

  /* ── Helpers ─────────────────────────────────────────────────────────── */
  function laneX(lane) {
    return ROAD_X + lane * LANE_W + (LANE_W - PLAYER_W) / 2;
  }

  /* ── JUGADOR ─────────────────────────────────────────────────────────── */
  function makePlayer(id, lane, color, colorGlow, colorDark) {
    return {
      id, lane,
      x: laneX(lane), targetX: laneX(lane),
      y: H - 120,
      w: PLAYER_W, h: PLAYER_H,
      color, colorGlow, colorDark,
      alive: true, score: 0,
      exploding: false, explodeTimer: 0,
      trail: [],
      moveQueue: [],   // cola de direcciones pendientes: -1 (izq) o +1 (der)
      moving: false,   // true mientras está animando hacia targetX
    };
  }

  /* ── INIT ────────────────────────────────────────────────────────────── */
  function init(selectedMode) {
    mode       = selectedMode || mode;
    roadOffset = 0;
    roadSpeed  = BASE_ROAD_SPEED;
    spawnTimer = 0;
    speedTimer = 0;
    deltaAcc   = 0;
    particles  = [];
    obstacles  = [];
    lastLaneMove[1] = 0;
    lastLaneMove[2] = 0;

    p1 = makePlayer(1, 1,            C.p1, C.p1glow, C.p1dark);
    p2 = makePlayer(2, LANE_COUNT-2, C.p2, C.p2glow, C.p2dark);
    p2.alive = (mode === 2);
    lastLaneMove[1] = 0; lastLaneMove[2] = 0;

    generateStars();
    gameState = 'playing';
  }

  function generateStars() {
    bgStars = [];
    for (let i = 0; i < 80; i++)
      bgStars.push({ x: Math.random()*W, y: Math.random()*H,
        r: Math.random()*1.2+0.3, a: Math.random()*0.7+0.3,
        speed: Math.random()*0.4+0.1 }); // factor relativo, se escala con roadSpeed
  }

  /* ================================================================
     UPDATE  — todo el movimiento multiplicado por dt (segundos)
     ================================================================ */
  function update(dt) {
    if (gameState !== 'playing') return;

    // Desplazamiento de la carretera (px/seg × seg = px)
    roadOffset = (roadOffset + roadSpeed * dt) % 40;

    // Dificultad progresiva
    speedTimer += dt;
    if (speedTimer >= SPEED_INTERVAL) {
      speedTimer -= SPEED_INTERVAL;
      roadSpeed  += SPEED_STEP;
    }

    // Puntuación por segundo
    deltaAcc += dt;
    if (deltaAcc >= 1) {
      deltaAcc -= 1;
      if (p1.alive && !p1.exploding) p1.score++;
      if (p2.alive && !p2.exploding) p2.score++;
    }

    // Input de carril
    const now = performance.now();
    handleLaneInput(p1, 'KeyA', 'KeyD');
    if (mode === 2) handleLaneInput(p2, 'ArrowLeft', 'ArrowRight');

    // Animación suave hacia el carril destino (independiente de fps)
    smoothSnap(p1, dt);
    smoothSnap(p2, dt);

    // Estrellas de fondo
    for (const s of bgStars) {
      // velocidad relativa a roadSpeed, escalada por dt
      s.y += s.speed * (roadSpeed / BASE_ROAD_SPEED) * STAR_BASE_SPEED * dt;
      if (s.y > H) { s.y = -2; s.x = Math.random() * W; }
    }

    // Spawn de obstáculos (acumulamos tiempo en segundos)
    spawnTimer += dt;
    // El intervalo se reduce con la velocidad, pero nunca menos de 0.35 seg
    const interval = Math.max(0.35, OBSTACLE_INTERVAL - (roadSpeed - BASE_ROAD_SPEED) / BASE_ROAD_SPEED * 0.25);
    if (spawnTimer >= interval) {
      spawnTimer -= interval;
      spawnObstacle();
    }

    // Mover obstáculos (px/seg × dt)
    for (const o of obstacles) o.y += roadSpeed * 1.05 * dt;
    for (let i = obstacles.length - 1; i >= 0; i--)
      if (obstacles[i].y > H + 80) obstacles.splice(i, 1);

    // Colisiones
    checkPlayerObstacleCollisions();

    // Partículas y trails
    updateParticles(dt);
    updateTrail(p1);
    if (mode === 2) updateTrail(p2);

    // Fin de explosiones
    checkExplosionDone(p1, dt);
    checkExplosionDone(p2, dt);

    // Game over — guardar récord
    if (mode === 2 && (!p1.alive || !p2.alive) && !p1.exploding && !p2.exploding) {
      saveRecords();
      gameState = 'gameover'; return;
    }
    const p1Done = !p1.alive || p1.exploding;
    const p2Done = (mode === 1) || !p2.alive || p2.exploding;
    if (p1Done && p2Done && !p1.exploding && !p2.exploding) {
      saveRecords();
      gameState = 'gameover';
    }
  }

  /* ── Captura input: encola direcciones, una por pulsación ───────────── */
  function handleLaneInput(player, leftKey, rightKey) {
    if (!player.alive || player.exploding) return;

    const leftDown  = keys[leftKey];
    const rightDown = keys[rightKey];
    const leftFresh  = leftDown  && !keyJustPressed[leftKey  + player.id];
    const rightFresh = rightDown && !keyJustPressed[rightKey + player.id];

    // Encolar solo si hay pulsación nueva y la cola no está llena (máx 2 pending)
    if (leftFresh  && player.moveQueue.length < 2) player.moveQueue.push(-1);
    if (rightFresh && player.moveQueue.length < 2) player.moveQueue.push(+1);

    keyJustPressed[leftKey  + player.id] = leftDown;
    keyJustPressed[rightKey + player.id] = rightDown;
  }

  /* ── Animación hacia targetX; al llegar, consume el siguiente de la cola */
  function smoothSnap(player, dt) {
    if (!player.alive) return;
    const diff = player.targetX - player.x;

    if (Math.abs(diff) < 0.5) {
      // Llegó al destino
      player.x      = player.targetX;
      player.moving  = false;

      // Consumir siguiente movimiento de la cola
      if (player.moveQueue.length > 0) {
        const dir = player.moveQueue.shift();
        const newLane = player.lane + dir;
        if (newLane >= 0 && newLane < LANE_COUNT) {
          player.lane    = newLane;
          player.targetX = laneX(newLane);
          player.moving  = true;
        }
        // Si el carril estaba fuera de límite simplemente se descarta
      }
    } else {
      player.moving = true;
      player.x += diff * (1 - Math.exp(-SNAP_SPEED * dt));
    }
  }

  /* ── Spawn ───────────────────────────────────────────────────────────── */
  function spawnObstacle() {
    const lanesUsed = new Set();
    const count = Math.random() < 0.55 ? 2 : Math.random() < 0.15 ? 3 : 1;
    for (let i = 0; i < count; i++) {
      let lane, tries = 0;
      do { lane = Math.floor(Math.random() * LANE_COUNT); tries++; }
      while (lanesUsed.has(lane) && tries < 8);
      lanesUsed.add(lane);
      obstacles.push({
        x: ROAD_X + lane * LANE_W + (LANE_W - OBSTACLE_W) / 2,
        y: -OBSTACLE_H - 10,
        w: OBSTACLE_W, h: OBSTACLE_H, lane,
      });
    }
  }

  /* ── Colisiones ──────────────────────────────────────────────────────── */
  function checkPlayerObstacleCollisions() {
    for (const o of obstacles) {
      if (p1.alive && !p1.exploding && aabb(p1, o)) triggerExplosion(p1, o);
      if (mode === 2 && p2.alive && !p2.exploding && aabb(p2, o)) triggerExplosion(p2, o);
    }
  }

  function aabb(a, b) {
    const m = 4;
    return a.x+m < b.x+b.w-m && a.x+a.w-m > b.x+m &&
           a.y+m < b.y+b.h   && a.y+a.h   > b.y+m;
  }

  function triggerExplosion(player, source) {
    if (player.exploding) return; // evitar doble trigger
    player.exploding = true;
    player.explodeTimer = 1.0; // segundos de animación
    spawnExplosion(player.x + player.w/2, player.y + player.h/2, player.color);
    if (source) spawnExplosion(source.x + source.w/2, source.y + source.h/2, C.enemy);
  }

  function checkExplosionDone(player, dt) {
    if (!player.exploding) return;
    player.explodeTimer -= dt;
    if (player.explodeTimer <= 0) { player.exploding = false; player.alive = false; }
  }

  function saveRecords() {
    if (mode === 1) {
      if (p1.score > record1P) { record1P = p1.score; setCookie('nls_record_1p', record1P); }
    } else {
      const best = Math.max(p1.score, p2.score);
      if (best > record2P) { record2P = best; setCookie('nls_record_2p', record2P); }
    }
  }

  /* ── Partículas (velocidades en px/seg, decay en vida/seg) ───────────── */
  function spawnExplosion(cx, cy, mainColor) {
    for (let i = 0; i < 40; i++) {
      const angle = Math.random() * Math.PI * 2;
      const spd   = (Math.random() * 6 + 1.5) * 60; // px/seg
      particles.push({
        x: cx, y: cy,
        vx: Math.cos(angle) * spd,
        vy: Math.sin(angle) * spd,
        life: 1,
        decay: Math.random() * 1.5 + 0.8, // vida/seg
        r: Math.random() * 5 + 2,
        color: C.explosion[Math.floor(Math.random() * C.explosion.length)],
      });
    }
  }

  function updateParticles(dt) {
    for (const p of particles) {
      p.x    += p.vx * dt;
      p.y    += p.vy * dt;
      p.vy   += 200 * dt; // gravedad en px/seg²
      p.life -= p.decay * dt;
    }
    for (let i = particles.length - 1; i >= 0; i--)
      if (particles[i].life <= 0) particles.splice(i, 1);
  }

  function updateTrail(player) {
    if (player.alive && !player.exploding) {
      player.trail.unshift({ x: player.x, y: player.y });
      if (player.trail.length > 10) player.trail.pop();
    }
  }

  /* ================================================================
     DRAW
     ================================================================ */
  function draw() {
    ctx.clearRect(0, 0, W, H);
    if (gameState === 'menu')     { drawMenu(); return; }
    if (gameState === 'gameover') { drawGameOver(); return; }
    drawBackground();
    drawRoad();
    drawParticles();
    for (const o of obstacles) drawObstacle(o);
    drawPlayerCar(p1);
    if (mode === 2) drawPlayerCar(p2);
    drawHUD();
  }

  function drawBackground() {
    ctx.fillStyle = C.bg; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = C.bgAlt;
    ctx.fillRect(0,0,ROAD_X,H);
    ctx.fillRect(ROAD_RIGHT,0,W-ROAD_RIGHT,H);
    for (const s of bgStars) {
      ctx.globalAlpha = s.a * 0.5; ctx.fillStyle = '#8888cc';
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawRoad() {
    ctx.fillStyle = C.road; ctx.fillRect(ROAD_X,0,ROAD_W,H);

    for (let lane = 1; lane < LANE_COUNT; lane++) {
      const lx = ROAD_X + lane * LANE_W;
      for (let y = -40 + roadOffset; y < H+40; y += 40) {
        ctx.fillStyle = C.laneLine; ctx.fillRect(lx-1, y, 2, 24);
      }
    }

    ctx.shadowColor = C.roadEdge; ctx.shadowBlur = 18;
    ctx.strokeStyle = C.roadEdge; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(ROAD_X,0); ctx.lineTo(ROAD_X,H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ROAD_RIGHT,0); ctx.lineTo(ROAD_RIGHT,H); ctx.stroke();
    ctx.shadowBlur = 0;

    ctx.strokeStyle = 'rgba(70,0,180,0.25)'; ctx.lineWidth = 1;
    for (let lane = 1; lane < LANE_COUNT; lane++) {
      const lx = ROAD_X + lane * LANE_W;
      ctx.beginPath(); ctx.moveTo(lx,0); ctx.lineTo(lx,H); ctx.stroke();
    }
  }

  function drawPlayerCar(player) {
    if (!player.alive) return;
    if (player.exploding && Math.floor(player.explodeTimer * 8) % 2 === 0) return;
    const {x,y,w,h,color,colorGlow,colorDark} = player;

    for (let i = player.trail.length-1; i >= 0; i--) {
      const t = player.trail[i];
      ctx.globalAlpha = (1 - i/player.trail.length) * 0.22;
      ctx.fillStyle = color; ctx.fillRect(t.x, t.y, w, h);
    }
    ctx.globalAlpha = 1;

    ctx.shadowColor = colorGlow; ctx.shadowBlur = 20;
    ctx.fillStyle = colorDark;   ctx.fillRect(x,y,w,h);
    ctx.fillStyle = color;       ctx.fillRect(x+w*0.25, y+4, w*0.5, h-8);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(x+3,y+4,7,5); ctx.fillRect(x+w-10,y+4,7,5);
    ctx.fillStyle = '#ff4444';
    ctx.fillRect(x+3,y+h-8,7,5); ctx.fillRect(x+w-10,y+h-8,7,5);
    ctx.fillStyle = '#ffffff'; ctx.font = 'bold 11px Courier New';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(player.id===1?'P1':'P2', x+w/2, y+h/2);
    ctx.shadowBlur = 0; ctx.textBaseline = 'alphabetic';
  }

  function drawObstacle(o) {
    ctx.shadowColor = C.enemyGlow; ctx.shadowBlur = 14;
    ctx.fillStyle = C.enemyDark;  ctx.fillRect(o.x,o.y,o.w,o.h);
    ctx.fillStyle = C.enemy;      ctx.fillRect(o.x+o.w*0.2,o.y+4,o.w*0.6,o.h-8);
    ctx.fillStyle = '#ff8888';
    ctx.fillRect(o.x+3,o.y+o.h-8,7,5); ctx.fillRect(o.x+o.w-10,o.y+o.h-8,7,5);
    ctx.shadowBlur = 0;
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0,p.life);
      ctx.shadowColor = p.color; ctx.shadowBlur = 8;
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;
  }

  function drawHUD() {
    ctx.fillStyle = 'rgba(5,5,16,0.8)'; ctx.fillRect(0,0,W,44);
    ctx.shadowColor = C.p1; ctx.shadowBlur = 10;
    ctx.fillStyle = p1.alive ? C.p1 : C.uiDim;
    ctx.font = 'bold 15px Courier New'; ctx.textAlign = 'left';
    ctx.fillText(`P1: ${p1.score}pts`, 16, 27);
    if (mode === 2) {
      ctx.shadowColor = C.p2; ctx.shadowBlur = 10;
      ctx.fillStyle = p2.alive ? C.p2 : C.uiDim;
      ctx.font = 'bold 15px Courier New'; ctx.textAlign = 'right';
      ctx.fillText(`P2: ${p2.score}pts`, W-16, 27);
    }
    ctx.shadowBlur = 0; ctx.textAlign = 'left';
  }

  /* ── MENÚ ────────────────────────────────────────────────────────────── */
  function drawMenu() {
    ctx.fillStyle = C.bg; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = 'rgba(13,13,32,0.7)'; ctx.fillRect(ROAD_X,0,ROAD_W,H);
    ctx.strokeStyle = 'rgba(112,0,255,0.3)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(ROAD_X,0); ctx.lineTo(ROAD_X,H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ROAD_RIGHT,0); ctx.lineTo(ROAD_RIGHT,H); ctx.stroke();

    ctx.textAlign = 'center';
    ctx.shadowColor = C.titleGlow; ctx.shadowBlur = 40;
    ctx.fillStyle = C.title; ctx.font = 'bold 54px Courier New';
    ctx.fillText('NEON', W/2, 130);
    ctx.shadowColor = '#00e5ff'; ctx.shadowBlur = 30;
    ctx.fillStyle = '#00e5ff'; ctx.font = 'bold 54px Courier New';
    ctx.fillText('LANE SPLITTER', W/2, 192);
    ctx.shadowBlur = 0;

    ctx.fillStyle = C.uiDim; ctx.font = '16px Courier New';
    ctx.fillText('ARCADE RACING · VISTA AÉREA', W/2, 230);

    const pulse = 0.7 + 0.3*Math.sin(Date.now()/400);
    ctx.strokeStyle = `rgba(112,0,255,${pulse})`; ctx.lineWidth = 2;
    ctx.shadowColor = C.roadEdge; ctx.shadowBlur = 12;
    ctx.beginPath(); ctx.moveTo(W/2-200,252); ctx.lineTo(W/2+200,252); ctx.stroke();
    ctx.shadowBlur = 0;

    for (const [text, y, col, glow] of [
      ['[ 1 ]  1 JUGADOR',   316, C.p1, C.p1glow],
      ['[ 2 ]  2 JUGADORES', 384, C.p2, C.p2glow],
    ]) {
      const p = 0.85 + 0.15*Math.sin(Date.now()/500);
      ctx.shadowColor = glow; ctx.shadowBlur = 20*p;
      ctx.fillStyle = col; ctx.font = 'bold 26px Courier New';
      ctx.globalAlpha = p; ctx.fillText(text, W/2, y);
      ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    }

    ctx.fillStyle = C.uiDim; ctx.font = '13px Courier New';
    ctx.fillText('P1: A / D   —   P2: ← / →', W/2, 460);
    ctx.fillText('Esquiva obstáculos · Sobrevive más tiempo', W/2, 485);

    // Récords
    ctx.font = '13px Courier New';
    if (record1P > 0 || record2P > 0) {
      ctx.fillStyle = C.uiDim;
      ctx.fillText('— RÉCORDS —', W/2, 524);
      if (record1P > 0) {
        ctx.shadowColor = C.p1; ctx.shadowBlur = 8;
        ctx.fillStyle = C.p1;
        ctx.fillText(`1 JUGADOR: ${record1P} pts`, W/2, 545);
        ctx.shadowBlur = 0;
      }
      if (record2P > 0) {
        ctx.shadowColor = C.p2; ctx.shadowBlur = 8;
        ctx.fillStyle = C.p2;
        ctx.fillText(`2 JUGADORES: ${record2P} pts`, W/2, 566);
        ctx.shadowBlur = 0;
      }
    } else {
      ctx.fillStyle = C.uiDim;
      ctx.fillText('Aún no hay récords — ¡sé el primero!', W/2, 545);
    }

    // Enlace política de privacidad
    ctx.fillStyle = '#3a3a6a';
    ctx.font = '11px Courier New';
    ctx.fillText('Política de Privacidad', W/2, 590);

    ctx.textAlign = 'left';
  }

  /* ── GAME OVER ───────────────────────────────────────────────────────── */
  function drawGameOver() {
    ctx.fillStyle = 'rgba(5,5,16,0.95)'; ctx.fillRect(0,0,W,H);
    drawParticles();
    ctx.textAlign = 'center';

    let winMsg, winColor;
    if (mode === 1) {
      winMsg = 'FIN DE LA CARRERA'; winColor = C.p1;
    } else if (p1.score > p2.score) {
      winMsg = '¡EL JUGADOR 1 HA GANADO LA CARRERA!'; winColor = C.p1;
    } else if (p2.score > p1.score) {
      winMsg = '¡EL JUGADOR 2 HA GANADO LA CARRERA!'; winColor = C.p2;
    } else {
      winMsg = '¡EMPATE PERFECTO!'; winColor = C.gold;
    }

    ctx.shadowColor = winColor; ctx.shadowBlur = 36;
    ctx.fillStyle = winColor; ctx.font = 'bold 30px Courier New';
    wrapText(ctx, winMsg, W/2, 130, 680, 40);

    ctx.strokeStyle = winColor; ctx.lineWidth = 2; ctx.shadowBlur = 12;
    ctx.beginPath(); ctx.moveTo(W/2-240,188); ctx.lineTo(W/2+240,188); ctx.stroke();
    ctx.shadowBlur = 0;

    ctx.shadowColor = C.p1; ctx.shadowBlur = 16;
    ctx.fillStyle = C.p1; ctx.font = 'bold 22px Courier New';
    const p1New = mode === 1 ? p1.score >= record1P : p1.score >= record2P;
    ctx.fillText(`JUGADOR 1 — ${p1.score} PTS${p1New && p1.score > 0 ? '  ★ RÉCORD' : ''}`, W/2, 248);
    if (mode === 2) {
      ctx.shadowColor = C.p2; ctx.shadowBlur = 16;
      ctx.fillStyle = C.p2;
      const p2New = p2.score >= record2P;
      ctx.fillText(`JUGADOR 2 — ${p2.score} PTS${p2New && p2.score > 0 ? '  ★ RÉCORD' : ''}`, W/2, 292);
    }
    ctx.shadowBlur = 0;

    const pulse = 0.7 + 0.3*Math.sin(Date.now()/400);
    ctx.shadowColor = 'rgba(200,200,255,0.5)'; ctx.shadowBlur = 16*pulse;
    ctx.fillStyle = `rgba(200,200,255,${0.8*pulse})`;
    ctx.font = 'bold 20px Courier New';
    ctx.fillText('[ ENTER ]  VOLVER AL MENÚ', W/2, 400);
    ctx.font = '13px Courier New'; ctx.fillStyle = C.uiDim; ctx.shadowBlur = 0;
    ctx.fillText('o pulsa 1 / 2 para jugar de nuevo directamente', W/2, 434);
    ctx.textAlign = 'left';
  }

  function wrapText(context, text, x, y, maxWidth, lineHeight) {
    const words = text.split(' '); let line = '';
    for (let n = 0; n < words.length; n++) {
      const test = line + words[n] + ' ';
      if (context.measureText(test).width > maxWidth && n > 0) {
        context.fillText(line, x, y); line = words[n] + ' '; y += lineHeight;
      } else line = test;
    }
    context.fillText(line, x, y);
  }

  /* ================================================================
     INPUT
     ================================================================ */
  document.addEventListener('keydown', e => {
    if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space'].includes(e.code))
      e.preventDefault();
    keys[e.code] = true;
    if (gameState === 'menu') {
      if (e.code === 'Digit1') init(1);
      if (e.code === 'Digit2') init(2);
    }
    if (gameState === 'gameover') {
      if (e.code === 'Enter')  gameState = 'menu';
      if (e.code === 'Digit1') init(1);
      if (e.code === 'Digit2') init(2);
    }
  });

  document.addEventListener('keyup', e => {
    keys[e.code] = false;
    delete keyJustPressed[e.code + 1];
    delete keyJustPressed[e.code + 2];
  });

  /* ================================================================
     LOOP — dt calculado en segundos, cappado a 100ms para evitar
     saltos enormes si la pestaña pierde el foco
     ================================================================ */
  function loop(timestamp) {
    const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
    lastTime = timestamp;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  /* ── ARRANQUE ────────────────────────────────────────────────────────── */
  generateStars();
  requestAnimationFrame(function menuLoop(ts) {
    lastTime = ts; draw();
    if (gameState === 'menu') requestAnimationFrame(menuLoop);
    else requestAnimationFrame(loop);
  });

  canvas.setAttribute('tabindex','0');
  window.addEventListener('load', () => canvas.focus());
  document.addEventListener('click', () => canvas.focus());

  // Enlace "Política de Privacidad" en el menú
  canvas.addEventListener('click', e => {
    if (gameState !== 'menu') return;
    const rect  = canvas.getBoundingClientRect();
    const scaleX = W / rect.width;
    const scaleY = H / rect.height;
    const cx = (e.clientX - rect.left) * scaleX;
    const cy = (e.clientY - rect.top)  * scaleY;
    // Zona del texto (centrado en W/2, y=590, ~160px ancho, ~14px alto)
    if (cx > W/2 - 80 && cx < W/2 + 80 && cy > 578 && cy < 596) {
      window.open('privacy.html', '_blank');
    }
  });

})();
</script>
</body>
