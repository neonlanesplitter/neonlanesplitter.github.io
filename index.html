  /* ================================================================

      recordTitle:    '— HIGH SCORES —',
      record1p:       (n) => `1 PLAYER: ${n} pts`,
      record2p:       (n) => `2 PLAYERS: ${n} pts`,
      footerLegal:    'Legal Notice',
      footerPrivacy:  'Privacy Policy',
      footerAbout:    'About',
      footerContact:  'Contact',
      // HUD
      p1score:        (n) => `P1: ${n}pts`,
      p2score:        (n) => `P2: ${n}pts`,
      buffPush:       'PUSH',
      buffShield:     'SHIELD',
      buffImmune:     'IMMUNE',
      // Pause
      pauseTitle:     'PAUSED',
      pauseResume:    '▶  RESUME',
      pauseHowto:     '?  HOW TO PLAY',
      pauseQuit:      '✕  QUIT TO MENU',
      pauseHint:      'ESC · resume   —   click an option',
      // How to play
      howtoTitle:     'HOW TO PLAY',
      howtoObjTitle:  'OBJECTIVE',
      howtoObj1:      'Dodge the red enemy cars by switching lanes.',
      howtoObj2:      'Survive as long as possible to rack up points.',
      howtoObj3:      'Speed increases every 10 seconds. There is no end!',
      howtoCtrlTitle: 'CONTROLS',
      howtoP1label:   'PLAYER 1',
      howtoP1left:    'A  ←  move left',
      howtoP1right:   'D  →  move right',
      howtoP2label:   'PLAYER 2',
      howtoP2left:    '←  move left',
      howtoP2right:   '→  move right',
      howtoItemTitle: 'ITEMS  (2-Player Mode only)',
      howtoItemSub:   'Colored diamonds appear on the road. Pick them up!',
      howtoBack:      '[ ESC ]  Back to menu  — or click here',
      items: [
        { name:'PUSH  (P)',    desc:'Move into rival\'s lane to push them one lane. Lasts 8 sec.' },
        { name:'SHIELD  (S)',  desc:'Absorbs the next hit from an enemy car. No time limit.' },
        { name:'IMMUNE  (I)', desc:'Invulnerable to enemies and pushes for 4 sec.' },
      ],
      // Game Over
      goEnd:          'RACE OVER',
      goWin1:         'PLAYER 1 HAS WON THE RACE!',
      goWin2:         'PLAYER 2 HAS WON THE RACE!',
      goDraw:         'PERFECT TIE!',
      goP1:           (n, rec) => `PLAYER 1 — ${n} PTS${rec ? '  ★ RECORD' : ''}`,
      goP2:           (n, rec) => `PLAYER 2 — ${n} PTS${rec ? '  ★ RECORD' : ''}`,
      goBack:         '[ ESC ]  BACK TO MENU',
      goReplay:       'or press 1 / 2 to play again directly',
    },
  };

  const T = isSpanish ? LANG.es : LANG.en;

  /* ── CONSTANTES ──────────────────────────────────────────────────────── */
  const ROAD_X     = 220;
  const ROAD_W     = 360;
  const ROAD_RIGHT = ROAD_X + ROAD_W;
  const LANE_COUNT = 6;
  const LANE_W     = ROAD_W / LANE_COUNT;

  const PLAYER_W        = LANE_W - 8;
  const PLAYER_H        = 56;
  const OBSTACLE_W      = LANE_W - 8;
  const OBSTACLE_H      = 66;
  const BASE_ROAD_SPEED = 420;
  const SPEED_STEP      = 84;
  const SPEED_INTERVAL  = 10;
  const OBSTACLE_INTERVAL = 0.8;
  const SNAP_SPEED      = 40;
  const STAR_BASE_SPEED = 60;
  const BUFF_W          = 24;
  const BUFF_H          = 24;
  const BUFF_INTERVAL   = 7;
  const PUSH_DURATION   = 8;
  const IMMUNITY_DUR    = 4;

  const C = {
    bg:'#050510', bgAlt:'#080818', road:'#0d0d20',
    roadEdge:'#7000ff', laneLine:'#1a1a3a',
    p1:'#00c8ff', p1glow:'rgba(0,200,255,0.6)', p1dark:'#004466',
    p2:'#ff2d96', p2glow:'rgba(255,45,150,0.6)', p2dark:'#440028',
    enemy:'#ff3030', enemyGlow:'rgba(255,48,48,0.55)', enemyDark:'#440000',
    ui:'#e0e0ff', uiDim:'#7070aa',
    gold:'#ffd700', title:'#cc88ff', titleGlow:'rgba(200,100,255,0.7)',
    explosion:['#ff6000','#ff3000','#ffcc00','#ff0060','#ffffff'],
    buffPush:'#ffaa00',    buffPushGlow:'rgba(255,170,0,0.75)',
    buffShield:'#00aaff',  buffShieldGlow:'rgba(0,170,255,0.75)',
    buffImmune:'#00ff88',  buffImmuneGlow:'rgba(0,255,136,0.75)',
  };

  // 'menu' | 'howto' | 'playing' | 'paused' | 'gameover'
  let gameState = 'menu';
  let mode      = 1;
  let roadOffset, roadSpeed, spawnTimer, speedTimer;
  let lastTime = 0, deltaAcc = 0;
  let particles, obstacles, buffs, keys = {}, bgStars = [];
  let buffSpawnTimer = 0;
  let p1, p2;

  function getCookie(name) {
    const match = document.cookie.match(new RegExp('(?:^|; )' + name + '=([^;]*)'));
    return match ? parseInt(decodeURIComponent(match[1]), 10) || 0 : 0;
  }
  function setCookie(name, value) {
    const expires = new Date();
    expires.setFullYear(expires.getFullYear() + 5);
    document.cookie = name + '=' + encodeURIComponent(value) +
      '; expires=' + expires.toUTCString() + '; path=/';
  }

  let record1P = getCookie('nls_record_1p');
  let record2P = getCookie('nls_record_2p');

  const keyJustPressed = {};
  const lastLaneMove   = { 1: 0, 2: 0 };

  function laneX(lane) {
    return ROAD_X + lane * LANE_W + (LANE_W - PLAYER_W) / 2;
  }

  function makePlayer(id, lane, color, colorGlow, colorDark) {
    return {
      id, lane,
      x: laneX(lane), targetX: laneX(lane),
      y: H - 120,
      w: PLAYER_W, h: PLAYER_H,
      color, colorGlow, colorDark,
      alive: true, score: 0,
      exploding: false, explodeTimer: 0,
      trail: [],
      moveQueue: [],
      moving: false,
      lastDir: 0,
      buffType: null,
      buffTimer: 0,
    };
  }

  function init(selectedMode) {
    mode           = selectedMode || mode;
    roadOffset     = 0;
    roadSpeed      = BASE_ROAD_SPEED;
    spawnTimer     = 0;
    speedTimer     = 0;
    deltaAcc       = 0;
    particles      = [];
    obstacles      = [];
    buffs          = [];
    buffSpawnTimer = 0;
    lastLaneMove[1] = 0;
    lastLaneMove[2] = 0;

    p1 = makePlayer(1, 1,            C.p1, C.p1glow, C.p1dark);
    p2 = makePlayer(2, LANE_COUNT-2, C.p2, C.p2glow, C.p2dark);
    p2.alive = (mode === 2);

    generateStars();
    gameState = 'playing';
  }

  function generateStars() {
    bgStars = [];
    for (let i = 0; i < 80; i++)
      bgStars.push({ x: Math.random()*W, y: Math.random()*H,
        r: Math.random()*1.2+0.3, a: Math.random()*0.7+0.3,
        speed: Math.random()*0.4+0.1 });
  }

  /* ================================================================
     UPDATE
     ================================================================ */
  function update(dt) {
    if (gameState !== 'playing') return;

    roadOffset = (roadOffset + roadSpeed * dt) % 40;
    speedTimer += dt;
    if (speedTimer >= SPEED_INTERVAL) { speedTimer -= SPEED_INTERVAL; roadSpeed += SPEED_STEP; }

    deltaAcc += dt;
    if (deltaAcc >= 1) {
      deltaAcc -= 1;
      if (p1.alive && !p1.exploding) p1.score++;
      if (p2.alive && !p2.exploding) p2.score++;
    }

    handleLaneInput(p1, 'KeyA', 'KeyD');
    if (mode === 2) handleLaneInput(p2, 'ArrowLeft', 'ArrowRight');

    smoothSnap(p1, dt);
    smoothSnap(p2, dt);

    for (const s of bgStars) {
      s.y += s.speed * (roadSpeed / BASE_ROAD_SPEED) * STAR_BASE_SPEED * dt;
      if (s.y > H) { s.y = -2; s.x = Math.random() * W; }
    }

    spawnTimer += dt;
    const interval = Math.max(0.35, OBSTACLE_INTERVAL - (roadSpeed - BASE_ROAD_SPEED) / BASE_ROAD_SPEED * 0.25);
    if (spawnTimer >= interval) { spawnTimer -= interval; spawnObstacle(); }

    for (const o of obstacles) o.y += roadSpeed * 1.05 * dt;
    for (let i = obstacles.length - 1; i >= 0; i--)
      if (obstacles[i].y > H + 80) obstacles.splice(i, 1);

    checkPlayerObstacleCollisions();

    if (mode === 2) {
      buffSpawnTimer += dt;
      if (buffSpawnTimer >= BUFF_INTERVAL) { buffSpawnTimer -= BUFF_INTERVAL; spawnBuff(); }
      for (const b of buffs) b.y += roadSpeed * dt;
      for (let i = buffs.length - 1; i >= 0; i--)
        if (buffs[i].y > H + 40) buffs.splice(i, 1);
      checkBuffPickups();
      updateBuffTimers(dt);
    }

    updateParticles(dt);
    updateTrail(p1);
    if (mode === 2) updateTrail(p2);

    checkExplosionDone(p1, dt);
    checkExplosionDone(p2, dt);

    if (mode === 2 && (!p1.alive || !p2.alive) && !p1.exploding && !p2.exploding) {
      saveRecords(); gameState = 'gameover'; return;
    }
    const p1Done = !p1.alive || p1.exploding;
    const p2Done = (mode === 1) || !p2.alive || p2.exploding;
    if (p1Done && p2Done && !p1.exploding && !p2.exploding) { saveRecords(); gameState = 'gameover'; }
  }

  function handleLaneInput(player, leftKey, rightKey) {
    if (!player.alive || player.exploding) return;
    const leftDown   = keys[leftKey];
    const rightDown  = keys[rightKey];
    const leftFresh  = leftDown  && !keyJustPressed[leftKey  + player.id];
    const rightFresh = rightDown && !keyJustPressed[rightKey + player.id];
    if (leftFresh  && player.moveQueue.length < 2) player.moveQueue.push(-1);
    if (rightFresh && player.moveQueue.length < 2) player.moveQueue.push(+1);
    keyJustPressed[leftKey  + player.id] = leftDown;
    keyJustPressed[rightKey + player.id] = rightDown;
  }

  function smoothSnap(player, dt) {
    if (!player.alive) return;
    const diff = player.targetX - player.x;
    if (Math.abs(diff) < 0.5) {
      player.x = player.targetX;
      if (mode === 2 && player.buffType === 'push' && player.moving) {
        const other = player.id === 1 ? p2 : p1;
        if (other.alive && !other.exploding && other.lane === player.lane)
          doPush(player, other);
      }
      player.moving = false;
      if (player.moveQueue.length > 0) {
        const dir = player.moveQueue.shift();
        const newLane = player.lane + dir;
        if (newLane >= 0 && newLane < LANE_COUNT) {
          player.lane = newLane; player.targetX = laneX(newLane);
          player.moving = true;  player.lastDir  = dir;
        }
      }
    } else {
      player.moving = true;
      player.x += diff * (1 - Math.exp(-SNAP_SPEED * dt));
    }
  }

  function spawnObstacle() {
    const lanesUsed = new Set();
    const count = Math.random() < 0.55 ? 2 : Math.random() < 0.15 ? 3 : 1;
    for (let i = 0; i < count; i++) {
      let lane, tries = 0;
      do { lane = Math.floor(Math.random() * LANE_COUNT); tries++; }
      while (lanesUsed.has(lane) && tries < 8);
      lanesUsed.add(lane);
      obstacles.push({
        x: ROAD_X + lane * LANE_W + (LANE_W - OBSTACLE_W) / 2,
        y: -OBSTACLE_H - 10, w: OBSTACLE_W, h: OBSTACLE_H, lane,
      });
    }
  }

  function checkPlayerObstacleCollisions() {
    for (let i = obstacles.length - 1; i >= 0; i--) {
      const o = obstacles[i];
      let absorbed = false;
      if (p1.alive && !p1.exploding && aabb(p1, o)) {
        if (p1.buffType === 'immunity') { /* inmune */ }
        else if (p1.buffType === 'shield') {
          p1.buffType = null; p1.buffTimer = 0;
          spawnShieldBreak(p1); obstacles.splice(i, 1); absorbed = true;
        } else triggerExplosion(p1, o);
      }
      if (!absorbed && mode === 2 && p2.alive && !p2.exploding && aabb(p2, o)) {
        if (p2.buffType === 'immunity') { /* inmune */ }
        else if (p2.buffType === 'shield') {
          p2.buffType = null; p2.buffTimer = 0;
          spawnShieldBreak(p2); obstacles.splice(i, 1);
        } else triggerExplosion(p2, o);
      }
    }
  }

  function aabb(a, b) {
    const m = 4;
    return a.x+m < b.x+b.w-m && a.x+a.w-m > b.x+m &&
           a.y+m < b.y+b.h   && a.y+a.h   > b.y+m;
  }

  function triggerExplosion(player, source) {
    if (player.exploding) return;
    player.exploding = true; player.explodeTimer = 1.0;
    spawnExplosion(player.x + player.w/2, player.y + player.h/2);
    if (source) spawnExplosion(source.x + source.w/2, source.y + source.h/2);
  }

  function checkExplosionDone(player, dt) {
    if (!player.exploding) return;
    player.explodeTimer -= dt;
    if (player.explodeTimer <= 0) { player.exploding = false; player.alive = false; }
  }

  function saveRecords() {
    if (mode === 1) {
      if (p1.score > record1P) { record1P = p1.score; setCookie('nls_record_1p', record1P); }
    } else {
      const best = Math.max(p1.score, p2.score);
      if (best > record2P) { record2P = best; setCookie('nls_record_2p', record2P); }
    }
  }

  /* ── BUFFS ───────────────────────────────────────────────────────────── */
  function spawnBuff() {
    const types = ['push','shield','immunity'];
    const type  = types[Math.floor(Math.random() * types.length)];
    const lane  = Math.floor(Math.random() * LANE_COUNT);
    buffs.push({ type,
      x: ROAD_X + lane * LANE_W + (LANE_W - BUFF_W) / 2,
      y: -BUFF_H - 10, w: BUFF_W, h: BUFF_H, lane });
  }

  function checkBuffPickups() {
    for (let i = buffs.length - 1; i >= 0; i--) {
      const b = buffs[i];
      if      (p1.alive && !p1.exploding && aabb(p1, b)) { applyBuff(p1, b.type); buffs.splice(i,1); }
      else if (p2.alive && !p2.exploding && aabb(p2, b)) { applyBuff(p2, b.type); buffs.splice(i,1); }
    }
  }

  function applyBuff(player, type) {
    player.buffType  = type;
    player.buffTimer = type === 'push' ? PUSH_DURATION : type === 'immunity' ? IMMUNITY_DUR : 999;
  }

  function updateBuffTimers(dt) {
    for (const pl of [p1, p2]) {
      if (!pl.buffType) continue;
      if (pl.buffType === 'push' || pl.buffType === 'immunity') {
        pl.buffTimer -= dt;
        if (pl.buffTimer <= 0) { pl.buffType = null; pl.buffTimer = 0; }
      }
    }
  }

  function doPush(pusher, target) {
    if (target.buffType === 'immunity') return;
    const newLane = target.lane + pusher.lastDir;
    if (newLane < 0 || newLane >= LANE_COUNT) return;
    target.lane = newLane; target.targetX = laneX(newLane);
    target.moveQueue = []; pusher.buffType = null;
    spawnPushEffect(target);
  }

  function spawnPushEffect(target) {
    const cx = target.x + target.w/2, cy = target.y + target.h/2;
    for (let i = 0; i < 12; i++) {
      const angle = Math.random()*Math.PI*2, spd = (Math.random()*2.5+0.5)*60;
      particles.push({ x:cx, y:cy, vx:Math.cos(angle)*spd, vy:Math.sin(angle)*spd,
        life:0.9, decay:Math.random()*1.2+1, r:Math.random()*3+1, color:C.buffPush });
    }
  }

  function spawnShieldBreak(player) {
    const cx = player.x + player.w/2, cy = player.y + player.h/2;
    for (let i = 0; i < 18; i++) {
      const angle = Math.random()*Math.PI*2, spd = (Math.random()*3+0.5)*60;
      particles.push({ x:cx, y:cy, vx:Math.cos(angle)*spd, vy:Math.sin(angle)*spd,
        life:1, decay:Math.random()*1.5+0.8, r:Math.random()*4+2, color:C.buffShield });
    }
  }

  function spawnExplosion(cx, cy) {
    for (let i = 0; i < 40; i++) {
      const angle = Math.random()*Math.PI*2, spd = (Math.random()*6+1.5)*60;
      particles.push({ x:cx, y:cy, vx:Math.cos(angle)*spd, vy:Math.sin(angle)*spd,
        life:1, decay:Math.random()*1.5+0.8, r:Math.random()*5+2,
        color:C.explosion[Math.floor(Math.random()*C.explosion.length)] });
    }
  }

  function updateParticles(dt) {
    for (const p of particles) { p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=200*dt; p.life-=p.decay*dt; }
    for (let i = particles.length-1; i >= 0; i--)
      if (particles[i].life <= 0) particles.splice(i,1);
  }

  function updateTrail(player) {
    if (player.alive && !player.exploding) {
      player.trail.unshift({ x: player.x, y: player.y });
      if (player.trail.length > 10) player.trail.pop();
    }
  }

  /* ================================================================
     DRAW
     ================================================================ */
  function draw() {
    ctx.clearRect(0, 0, W, H);
    if (gameState === 'menu')     { drawMenu();     return; }
    if (gameState === 'howto')    { drawHowTo();    return; }
    if (gameState === 'gameover') { drawGameOver(); return; }
    drawBackground(); drawRoad(); drawParticles();
    for (const o of obstacles) drawObstacle(o);
    if (mode === 2) for (const b of buffs) drawBuff(b);
    drawPlayerCar(p1);
    if (mode === 2) drawPlayerCar(p2);
    drawHUD();
    if (gameState === 'paused') drawPaused();
  }

  function drawBackground() {
    ctx.fillStyle = C.bg; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = C.bgAlt;
    ctx.fillRect(0,0,ROAD_X,H); ctx.fillRect(ROAD_RIGHT,0,W-ROAD_RIGHT,H);
    for (const s of bgStars) {
      ctx.globalAlpha = s.a*0.5; ctx.fillStyle = '#8888cc';
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawRoad() {
    ctx.fillStyle = C.road; ctx.fillRect(ROAD_X,0,ROAD_W,H);
    for (let lane = 1; lane < LANE_COUNT; lane++) {
      const lx = ROAD_X + lane * LANE_W;
      for (let y = -40+roadOffset; y < H+40; y += 40) {
        ctx.fillStyle = C.laneLine; ctx.fillRect(lx-1, y, 2, 24);
      }
    }
    ctx.shadowColor = C.roadEdge; ctx.shadowBlur = 18;
    ctx.strokeStyle = C.roadEdge; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(ROAD_X,0); ctx.lineTo(ROAD_X,H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ROAD_RIGHT,0); ctx.lineTo(ROAD_RIGHT,H); ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(70,0,180,0.25)'; ctx.lineWidth = 1;
    for (let lane = 1; lane < LANE_COUNT; lane++) {
      const lx = ROAD_X + lane * LANE_W;
      ctx.beginPath(); ctx.moveTo(lx,0); ctx.lineTo(lx,H); ctx.stroke();
    }
  }

  function drawPlayerCar(player) {
    if (!player.alive) return;
    if (player.exploding && Math.floor(player.explodeTimer*8)%2 === 0) return;
    const {x,y,w,h,color,colorGlow,colorDark} = player;
    for (let i = player.trail.length-1; i >= 0; i--) {
      const t = player.trail[i];
      ctx.globalAlpha = (1 - i/player.trail.length) * 0.22;
      ctx.fillStyle = color; ctx.fillRect(t.x, t.y, w, h);
    }
    ctx.globalAlpha = 1;
    ctx.shadowColor = colorGlow; ctx.shadowBlur = 20;
    ctx.fillStyle = colorDark; ctx.fillRect(x,y,w,h);
    ctx.fillStyle = color;     ctx.fillRect(x+w*0.25, y+4, w*0.5, h-8);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(x+3,y+4,7,5); ctx.fillRect(x+w-10,y+4,7,5);
    ctx.fillStyle = '#ff4444';
    ctx.fillRect(x+3,y+h-8,7,5); ctx.fillRect(x+w-10,y+h-8,7,5);
    ctx.fillStyle = '#ffffff'; ctx.font = 'bold 11px Courier New';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(player.id===1?'P1':'P2', x+w/2, y+h/2);
    ctx.shadowBlur = 0; ctx.textBaseline = 'alphabetic';
    drawBuffEffect(player);
  }

  function drawObstacle(o) {
    ctx.shadowColor = C.enemyGlow; ctx.shadowBlur = 14;
    ctx.fillStyle = C.enemyDark; ctx.fillRect(o.x,o.y,o.w,o.h);
    ctx.fillStyle = C.enemy;     ctx.fillRect(o.x+o.w*0.2,o.y+4,o.w*0.6,o.h-8);
    ctx.fillStyle = '#ff8888';
    ctx.fillRect(o.x+3,o.y+o.h-8,7,5); ctx.fillRect(o.x+o.w-10,o.y+o.h-8,7,5);
    ctx.shadowBlur = 0;
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0,p.life);
      ctx.shadowColor = p.color; ctx.shadowBlur = 8; ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;
  }

  function drawBuff(b) {
    const col  = {push:C.buffPush,     shield:C.buffShield,     immunity:C.buffImmune    }[b.type];
    const glow = {push:C.buffPushGlow, shield:C.buffShieldGlow, immunity:C.buffImmuneGlow}[b.type];
    const lbl  = {push:'P', shield:'S', immunity:'I'}[b.type];
    const pulse = 0.7+0.3*Math.sin(Date.now()/350);
    const cx = b.x+b.w/2, cy = b.y+b.h/2, r = b.w/2;
    ctx.globalAlpha = 0.85+0.15*pulse;
    ctx.shadowColor = glow; ctx.shadowBlur = 10+8*pulse; ctx.fillStyle = col;
    ctx.beginPath();
    ctx.moveTo(cx,cy-r); ctx.lineTo(cx+r,cy); ctx.lineTo(cx,cy+r); ctx.lineTo(cx-r,cy);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#000'; ctx.font = 'bold 11px Courier New';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(lbl, cx, cy);
    ctx.textBaseline = 'alphabetic'; ctx.globalAlpha = 1; ctx.shadowBlur = 0;
  }

  function drawBuffEffect(player) {
    if (!player.buffType || player.exploding) return;
    const {x,y,w,h} = player;
    const cx = x+w/2, cy = y+h/2;
    const pulse = 0.5+0.5*Math.sin(Date.now()/180);
    if (player.buffType === 'shield') {
      ctx.shadowColor = C.buffShieldGlow; ctx.shadowBlur = 14;
      ctx.strokeStyle = C.buffShield; ctx.lineWidth = 2.5; ctx.globalAlpha = 0.95;
      ctx.beginPath(); ctx.arc(cx, cy, Math.max(w,h)/2+9, 0, Math.PI*2); ctx.stroke();
      ctx.globalAlpha = 0.4;
      ctx.beginPath(); ctx.arc(cx, cy, Math.max(w,h)/2+4, 0, Math.PI*2); ctx.stroke();
    } else if (player.buffType === 'immunity') {
      ctx.shadowColor = C.buffImmuneGlow; ctx.shadowBlur = 16;
      ctx.strokeStyle = C.buffImmune; ctx.lineWidth = 2; ctx.globalAlpha = 0.5+0.5*pulse;
      ctx.strokeRect(x-5, y-5, w+10, h+10);
    } else if (player.buffType === 'push') {
      ctx.shadowColor = C.buffPushGlow; ctx.shadowBlur = 12;
      ctx.strokeStyle = C.buffPush; ctx.lineWidth = 2; ctx.globalAlpha = 0.5*pulse;
      ctx.strokeRect(x-5, y-5, w+10, h+10);
    }
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;
  }

  function drawBuffHUD(player, align, x) {
    if (!player.buffType) return;
    const col = {push:C.buffPush, shield:C.buffShield, immunity:C.buffImmune}[player.buffType];
    const lbl = {push:T.buffPush, shield:T.buffShield, immunity:T.buffImmune}[player.buffType];
    ctx.shadowColor = col; ctx.shadowBlur = 6;
    ctx.fillStyle = col; ctx.font = '10px Courier New'; ctx.textAlign = align;
    let txt = lbl;
    if (player.buffType !== 'shield' && player.buffTimer > 0)
      txt += ' ' + Math.ceil(player.buffTimer) + 's';
    ctx.fillText(txt, x, 40);
    ctx.shadowBlur = 0;
  }

  function drawHUD() {
    ctx.fillStyle = 'rgba(5,5,16,0.8)'; ctx.fillRect(0,0,W,44);
    ctx.shadowColor = C.p1; ctx.shadowBlur = 10;
    ctx.fillStyle = p1.alive ? C.p1 : C.uiDim;
    ctx.font = 'bold 15px Courier New'; ctx.textAlign = 'left';
    ctx.fillText(T.p1score(p1.score), 16, 27);
    if (mode === 2) {
      ctx.shadowColor = C.p2; ctx.shadowBlur = 10;
      ctx.fillStyle = p2.alive ? C.p2 : C.uiDim;
      ctx.textAlign = 'right';
      ctx.fillText(T.p2score(p2.score), W-16, 27);
      drawBuffHUD(p1, 'left',  16);
      drawBuffHUD(p2, 'right', W-16);
    }
    ctx.shadowBlur = 0; ctx.textAlign = 'left';
  }

  /* ================================================================
     MENÚ
     ================================================================ */
  function drawMenu() {
    ctx.fillStyle = C.bg; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = 'rgba(13,13,32,0.7)'; ctx.fillRect(ROAD_X,0,ROAD_W,H);
    ctx.strokeStyle = 'rgba(112,0,255,0.3)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(ROAD_X,0); ctx.lineTo(ROAD_X,H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ROAD_RIGHT,0); ctx.lineTo(ROAD_RIGHT,H); ctx.stroke();

    ctx.textAlign = 'center';
    ctx.shadowColor = C.titleGlow; ctx.shadowBlur = 40;
    ctx.fillStyle = C.title; ctx.font = 'bold 54px Courier New';
    ctx.fillText('NEON', W/2, 120);
    ctx.shadowColor = '#00e5ff'; ctx.shadowBlur = 30;
    ctx.fillStyle = '#00e5ff'; ctx.font = 'bold 54px Courier New';
    ctx.fillText('LANE SPLITTER', W/2, 180);
    ctx.shadowBlur = 0;

    ctx.fillStyle = C.uiDim; ctx.font = '15px Courier New';
    ctx.fillText(T.subtitle, W/2, 216);

    const pulse = 0.7+0.3*Math.sin(Date.now()/400);
    ctx.strokeStyle = `rgba(112,0,255,${pulse})`; ctx.lineWidth = 2;
    ctx.shadowColor = C.roadEdge; ctx.shadowBlur = 12;
    ctx.beginPath(); ctx.moveTo(W/2-200,236); ctx.lineTo(W/2+200,236); ctx.stroke();
    ctx.shadowBlur = 0;

    for (const [text, y, col, glow] of [
      [T.mode1, 296, C.p1, C.p1glow],
      [T.mode2, 354, C.p2, C.p2glow],
    ]) {
      const p = 0.85+0.15*Math.sin(Date.now()/500);
      ctx.shadowColor = glow; ctx.shadowBlur = 20*p;
      ctx.fillStyle = col; ctx.font = 'bold 26px Courier New';
      ctx.globalAlpha = p; ctx.fillText(text, W/2, y);
      ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    }

    const hp = 0.8+0.2*Math.sin(Date.now()/600);
    ctx.shadowColor = 'rgba(200,200,80,0.6)'; ctx.shadowBlur = 14*hp;
    ctx.fillStyle = `rgba(220,220,80,${hp})`; ctx.font = 'bold 18px Courier New';
    ctx.fillText(T.howtoBtn, W/2, 412);
    ctx.shadowBlur = 0;

    ctx.fillStyle = C.uiDim; ctx.font = '13px Courier New';
    ctx.fillText(T.controls, W/2, 450);

    ctx.font = '12px Courier New';
    if (record1P > 0 || record2P > 0) {
      ctx.fillStyle = C.uiDim;
      ctx.fillText(T.recordTitle, W/2, 486);
      if (record1P > 0) {
        ctx.shadowColor = C.p1; ctx.shadowBlur = 8; ctx.fillStyle = C.p1;
        ctx.fillText(T.record1p(record1P), W/2, 504); ctx.shadowBlur = 0;
      }
      if (record2P > 0) {
        ctx.shadowColor = C.p2; ctx.shadowBlur = 8; ctx.fillStyle = C.p2;
        ctx.fillText(T.record2p(record2P), W/2, 522); ctx.shadowBlur = 0;
      }
    } else {
      ctx.fillStyle = C.uiDim;
      ctx.fillText(T.noRecord, W/2, 500);
    }

    ctx.font = '11px Courier New'; ctx.fillStyle = '#3a3a6a';
    ctx.textAlign = 'left';   ctx.fillText(T.footerLegal,   16,    590);
    ctx.textAlign = 'center'; ctx.fillText(T.footerPrivacy, 330,   590);
                              ctx.fillText(T.footerAbout,   560,   590);
    ctx.textAlign = 'right';  ctx.fillText(T.footerContact, W-16,  590);
    ctx.textAlign = 'left';
  }

  /* ================================================================
     CÓMO JUGAR / HOW TO PLAY
     ================================================================ */
  function drawHowTo() {
    ctx.fillStyle = C.bg; ctx.fillRect(0,0,W,H);
    ctx.textAlign = 'center';
    ctx.shadowColor = 'rgba(220,220,80,0.6)'; ctx.shadowBlur = 24;
    ctx.fillStyle = '#dddd50'; ctx.font = 'bold 34px Courier New';
    ctx.fillText(T.howtoTitle, W/2, 52);
    ctx.shadowBlur = 0;

    ctx.strokeStyle = 'rgba(112,0,255,0.4)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(60,68); ctx.lineTo(W-60,68); ctx.stroke();

    sectionTitle(T.howtoObjTitle, W/2, 94);
    bodyText(T.howtoObj1, W/2, 114);
    bodyText(T.howtoObj2, W/2, 132);
    bodyText(T.howtoObj3, W/2, 150);

    ctx.strokeStyle = 'rgba(60,0,180,0.3)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(60,162); ctx.lineTo(W-60,162); ctx.stroke();

    sectionTitle(T.howtoCtrlTitle, W/2, 184);

    ctx.shadowColor = C.p1; ctx.shadowBlur = 10;
    ctx.fillStyle = C.p1; ctx.font = 'bold 13px Courier New'; ctx.textAlign = 'center';
    ctx.fillText(T.howtoP1label, 220, 204); ctx.shadowBlur = 0;
    ctx.fillStyle = C.uiDim; ctx.font = '12px Courier New';
    ctx.fillText(T.howtoP1left,  220, 220);
    ctx.fillText(T.howtoP1right, 220, 236);

    ctx.shadowColor = C.p2; ctx.shadowBlur = 10;
    ctx.fillStyle = C.p2; ctx.font = 'bold 13px Courier New';
    ctx.fillText(T.howtoP2label, 580, 204); ctx.shadowBlur = 0;
    ctx.fillStyle = C.uiDim; ctx.font = '12px Courier New';
    ctx.fillText(T.howtoP2left,  580, 220);
    ctx.fillText(T.howtoP2right, 580, 236);

    ctx.strokeStyle = 'rgba(60,0,180,0.3)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(60,250); ctx.lineTo(W-60,250); ctx.stroke();

    sectionTitle(T.howtoItemTitle, W/2, 272);
    bodyText(T.howtoItemSub, W/2, 292);

    const itemColors = [
      { col:C.buffPush,   glow:C.buffPushGlow,    lbl:'P' },
      { col:C.buffShield, glow:C.buffShieldGlow,   lbl:'S' },
      { col:C.buffImmune, glow:C.buffImmuneGlow,   lbl:'I' },
    ];

    T.items.forEach((item, i) => {
      const ic = itemColors[i];
      const iy = 322 + i * 64;
      const cx = 80, cy = iy + 10, r = 14;
      ctx.globalAlpha = 0.9;
      ctx.shadowColor = ic.glow; ctx.shadowBlur = 12; ctx.fillStyle = ic.col;
      ctx.beginPath();
      ctx.moveTo(cx,cy-r); ctx.lineTo(cx+r,cy); ctx.lineTo(cx,cy+r); ctx.lineTo(cx-r,cy);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#000'; ctx.font = 'bold 12px Courier New';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(ic.lbl, cx, cy);
      ctx.textBaseline = 'alphabetic'; ctx.globalAlpha = 1; ctx.shadowBlur = 0;

      ctx.shadowColor = ic.glow; ctx.shadowBlur = 8;
      ctx.fillStyle = ic.col; ctx.font = 'bold 13px Courier New'; ctx.textAlign = 'left';
      ctx.fillText(item.name, 110, iy + 4); ctx.shadowBlur = 0;
      ctx.fillStyle = '#9090bb'; ctx.font = '12px Courier New';
      ctx.fillText(item.desc, 110, iy + 20);
    });

    ctx.strokeStyle = 'rgba(60,0,180,0.3)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(60,518); ctx.lineTo(W-60,518); ctx.stroke();

    const pulse = 0.7+0.3*Math.sin(Date.now()/400);
    ctx.shadowColor = 'rgba(200,200,255,0.4)'; ctx.shadowBlur = 12*pulse;
    ctx.fillStyle = `rgba(180,180,255,${0.7*pulse})`;
    ctx.font = 'bold 16px Courier New'; ctx.textAlign = 'center';
    ctx.fillText(T.howtoBack, W/2, 552);
    ctx.shadowBlur = 0; ctx.textAlign = 'left';
  }

  /* ================================================================
     PAUSA
     ================================================================ */
  function drawPaused() {
    ctx.fillStyle = 'rgba(5,5,16,0.82)'; ctx.fillRect(0,0,W,H);

    const pw = 340, ph = 280, px = W/2 - pw/2, py = H/2 - ph/2;
    ctx.strokeStyle = '#7000ff'; ctx.lineWidth = 2;
    ctx.shadowColor = '#7000ff'; ctx.shadowBlur = 20;
    ctx.fillStyle = '#0a0a1e';
    ctx.beginPath(); ctx.roundRect(px, py, pw, ph, 10); ctx.fill(); ctx.stroke();
    ctx.shadowBlur = 0;

    ctx.textAlign = 'center';
    ctx.shadowColor = C.titleGlow; ctx.shadowBlur = 20;
    ctx.fillStyle = C.title; ctx.font = 'bold 32px Courier New';
    ctx.fillText(T.pauseTitle, W/2, py+52); ctx.shadowBlur = 0;

    ctx.strokeStyle = 'rgba(112,0,255,0.3)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(px+30,py+66); ctx.lineTo(px+pw-30,py+66); ctx.stroke();

    const opts = [
      { label:T.pauseResume, col:'#00ff88', y:py+108 },
      { label:T.pauseHowto,  col:'#dddd50', y:py+158 },
      { label:T.pauseQuit,   col:'#ff4466', y:py+208 },
    ];
    for (const o of opts) {
      const p = 0.85+0.15*Math.sin(Date.now()/500);
      ctx.shadowColor = o.col; ctx.shadowBlur = 10*p;
      ctx.fillStyle = o.col; ctx.font = 'bold 18px Courier New';
      ctx.globalAlpha = p; ctx.fillText(o.label, W/2, o.y);
      ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    }

    ctx.fillStyle = '#3a3a6a'; ctx.font = '11px Courier New';
    ctx.fillText(T.pauseHint, W/2, py+ph-18);
    ctx.textAlign = 'left';
  }

  /* ================================================================
     GAME OVER
     ================================================================ */
  function drawGameOver() {
    ctx.fillStyle = 'rgba(5,5,16,0.95)'; ctx.fillRect(0,0,W,H);
    drawParticles();
    ctx.textAlign = 'center';

    let winMsg, winColor;
    if (mode === 1) {
      winMsg = T.goEnd; winColor = C.p1;
    } else if (p1.score > p2.score) {
      winMsg = T.goWin1; winColor = C.p1;
    } else if (p2.score > p1.score) {
      winMsg = T.goWin2; winColor = C.p2;
    } else {
      winMsg = T.goDraw; winColor = C.gold;
    }

    ctx.shadowColor = winColor; ctx.shadowBlur = 36;
    ctx.fillStyle = winColor; ctx.font = 'bold 30px Courier New';
    wrapText(ctx, winMsg, W/2, 130, 680, 40);

    ctx.strokeStyle = winColor; ctx.lineWidth = 2; ctx.shadowBlur = 12;
    ctx.beginPath(); ctx.moveTo(W/2-240,188); ctx.lineTo(W/2+240,188); ctx.stroke();
    ctx.shadowBlur = 0;

    ctx.shadowColor = C.p1; ctx.shadowBlur = 16; ctx.fillStyle = C.p1;
    ctx.font = 'bold 22px Courier New';
    const p1New = mode === 1 ? p1.score >= record1P : p1.score >= record2P;
    ctx.fillText(T.goP1(p1.score, p1New && p1.score > 0), W/2, 248);
    if (mode === 2) {
      ctx.shadowColor = C.p2; ctx.shadowBlur = 16; ctx.fillStyle = C.p2;
      const p2New = p2.score >= record2P;
      ctx.fillText(T.goP2(p2.score, p2New && p2.score > 0), W/2, 292);
    }
    ctx.shadowBlur = 0;

    const pulse = 0.7+0.3*Math.sin(Date.now()/400);
    ctx.shadowColor = 'rgba(200,200,255,0.5)'; ctx.shadowBlur = 16*pulse;
    ctx.fillStyle = `rgba(200,200,255,${0.8*pulse})`;
    ctx.font = 'bold 20px Courier New';
    ctx.fillText(T.goBack, W/2, 400);
    ctx.font = '13px Courier New'; ctx.fillStyle = C.uiDim; ctx.shadowBlur = 0;
    ctx.fillText(T.goReplay, W/2, 434);
    ctx.textAlign = 'left';
  }

  /* ── Helpers de texto ────────────────────────────────────────────────── */
  function sectionTitle(text, x, y) {
    ctx.shadowColor = 'rgba(120,0,255,0.5)'; ctx.shadowBlur = 10;
    ctx.fillStyle = C.title; ctx.font = 'bold 14px Courier New'; ctx.textAlign = 'center';
    ctx.fillText(text, x, y); ctx.shadowBlur = 0;
  }
  function bodyText(text, x, y) {
    ctx.fillStyle = C.uiDim; ctx.font = '12px Courier New'; ctx.textAlign = 'center';
    ctx.fillText(text, x, y);
  }
  function wrapText(context, text, x, y, maxWidth, lineHeight) {
    const words = text.split(' '); let line = '';
    for (let n = 0; n < words.length; n++) {
      const test = line + words[n] + ' ';
      if (context.measureText(test).width > maxWidth && n > 0) {
        context.fillText(line, x, y); line = words[n] + ' '; y += lineHeight;
      } else line = test;
    }
    context.fillText(line, x, y);
  }

  /* ================================================================
     INPUT
     ================================================================ */
  document.addEventListener('keydown', e => {
    if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space'].includes(e.code))
      e.preventDefault();
    keys[e.code] = true;

    if (gameState === 'playing') {
      if (e.code === 'Escape') { gameState = 'paused'; return; }
    }
    if (gameState === 'paused') {
      if (e.code === 'Escape') { gameState = 'playing'; return; }
    }
    if (gameState === 'menu') {
      if (e.code === 'Digit1') init(1);
      if (e.code === 'Digit2') init(2);
      if (e.code === 'KeyH')   gameState = 'howto';
    }
    if (gameState === 'howto') {
      if (e.code === 'Escape' || e.code === 'KeyH') gameState = 'menu';
    }
    if (gameState === 'gameover') {
      if (e.code === 'Escape')  gameState = 'menu';
      if (e.code === 'Digit1') init(1);
      if (e.code === 'Digit2') init(2);
    }
  });

  document.addEventListener('keyup', e => {
    keys[e.code] = false;
    delete keyJustPressed[e.code + 1];
    delete keyJustPressed[e.code + 2];
  });

  /* ================================================================
     LOOP
     ================================================================ */
  function loop(timestamp) {
    const rawDt = (timestamp - lastTime) / 1000;
    lastTime = timestamp;
    const dt = gameState === 'paused' ? 0 : Math.min(rawDt, 0.1);
    update(dt); draw();
    requestAnimationFrame(loop);
  }

  generateStars();
  requestAnimationFrame(function menuLoop(ts) {
    lastTime = ts; draw();
    if (gameState === 'menu' || gameState === 'howto') requestAnimationFrame(menuLoop);
    else requestAnimationFrame(loop);
  });

  canvas.setAttribute('tabindex','0');
  window.addEventListener('load', () => canvas.focus());
  document.addEventListener('click', () => canvas.focus());

  /* ── Clicks en canvas ────────────────────────────────────────────────── */
  canvas.addEventListener('click', e => {
    const rect = canvas.getBoundingClientRect();
    const cx = (e.clientX - rect.left) * (W / rect.width);
    const cy = (e.clientY - rect.top)  * (H / rect.height);

    if (gameState === 'paused') {
      const ph = 280, py = H/2 - ph/2;
      if (cy > py+88  && cy < py+120) { gameState = 'playing'; return; }
      if (cy > py+138 && cy < py+170) { gameState = 'howto';   return; }
      if (cy > py+188 && cy < py+222) { gameState = 'menu';    return; }
    }

    if (gameState === 'menu') {
      if (cx > W/2-160 && cx < W/2+160 && cy > 278 && cy < 308) { init(1); return; }
      if (cx > W/2-160 && cx < W/2+160 && cy > 336 && cy < 366) { init(2); return; }
      if (cx > W/2-120 && cx < W/2+120 && cy > 396 && cy < 420) { gameState = 'howto'; return; }
      if (cy < 578 || cy > 596) return;
      if      (cx < 160)       window.open('legal.html',          '_blank');
      else if (cx < W/2+100)   window.open('privacy.html',        '_blank');
      else if (cx < W/2+220)   window.open('sobre-nosotros.html', '_blank');
      else                     window.open('contacto.html',        '_blank');
    }

    if (gameState === 'howto') {
      if (cy > 536 && cy < 566) { gameState = 'menu'; return; }
    }
  });

})();
</script>
